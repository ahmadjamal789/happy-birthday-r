<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday ❤️</title>
<audio autoplay loop>
    <source src="./Audio/delon_boomkin-happy-birthday-music-box-426283.mp3" type="audio/mp3">
</audio>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }body{
    height:100vh;
    background: radial-gradient(circle at top, #1a1a40, #000);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
}

h1{
    font-size:3em;
    animation: glow 2s infinite alternate;
    z-index:2;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #ff4d6d; }
    to{ text-shadow:0 0 30px #ffb3c6; }
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    z-index:2;
}

button:hover{
    background:#ff1e4d;
    transform:scale(1.1);
}

#message{
    margin-top:20px;
    font-size:1.5em;
    display:none;
    animation: fadeIn 2s ease forwards;
    z-index:2;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* CAKE */
.cake{
    position:absolute;
    bottom:40px;
    width:160px;
    height:120px;
    background:#ffb3c6;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    z-index:2;
    box-shadow:0 0 20px #ff4d6d;
}

.candle{
    width:8px;
    height:40px;
    background:white;
    position:absolute;
    top:-40px;
    border-radius:4px;
}

.flame{
    width:12px;
    height:12px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-55px;
    left:-2px;
    animation: flicker 0.3s infinite;
}

@keyframes flicker{
    0%{transform:scale(1); opacity:1;}
    50%{transform:scale(1.3); opacity:0.7;}
    100%{transform:scale(1); opacity:1;}
}

.blown .flame{
    display:none;
}

</style>
</head>
<body><h1>Happy Birthday🎉</h1>
  <h1 class="rama">Ramah</h1>
<styles>
.rama{
Font-size: 6rem;}
</styles>
<button onclick="startSurprise()">Click for Surprise 🎁</button>
<div id="message">You are an Amazing and beautiful person❤️✨<br>     
    
We Love you🥰💝</div>



<div class="cake" onclick="blowCandle()">
    <div class="candle"></div>
    <div class="flame"></div>
</div><canvas id="fireworks"></canvas>

<script>
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function random(min,max){
    return Math.random()*(max-min)+min;
}

function Particle(x,y,color){
    this.x=x;
    this.y=y;
    this.color=color;
    this.radius=2;
    this.velocityX=random(-5,5);
    this.velocityY=random(-5,5);
    this.alpha=1;
}

Particle.prototype.update=function(){
    this.x+=this.velocityX;
    this.y+=this.velocityY;
    this.alpha-=0.02;
};

Particle.prototype.draw=function(){
    ctx.globalAlpha=this.alpha;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle=this.color;
    ctx.fill();
    ctx.globalAlpha=1;
};

function createFirework(){
    let x=random(100,canvas.width-100);
    let y=random(100,canvas.height/2);
    let colors=["#ff4d6d","#ffd166","#06d6a0","#4cc9f0"];

    for(let i=0;i<80;i++){
        particles.push(new Particle(x,y,colors[Math.floor(Math.random()*colors.length)]));
    }
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,index)=>{
        p.update();
        p.draw();
        if(p.alpha<=0){
            particles.splice(index,1);
        }
    });

    requestAnimationFrame(animate);
}

function startSurprise(){
    document.getElementById('message').style.display='block';
    setInterval(createFirework,800);
}

function blowCandle(){
    document.querySelector('.cake').classList.add('blown');
    setTimeout(()=>{
        alert('🎂 Wish Granted! Happy Birthday! ❤️');
    },500);
}

animate();
</script></body>
</html>
